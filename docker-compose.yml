services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    networks:
      - web
    expose:
      - "8501"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - web
    depends_on:
      - app

volumes:
  app-data:
  app-logs:
  caddy-data:
  caddy-config:

networks:
  web:
