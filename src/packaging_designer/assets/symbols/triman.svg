<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Triman symbol (France) - person with recycling arrow -->
  <!-- Person figure -->
  <circle cx="35" cy="18" r="10" fill="#231F20"/>
  <line x1="35" y1="28" x2="35" y2="58" stroke="#231F20" stroke-width="6" stroke-linecap="round"/>
  <line x1="35" y1="58" x2="25" y2="85" stroke="#231F20" stroke-width="5" stroke-linecap="round"/>
  <line x1="35" y1="58" x2="45" y2="85" stroke="#231F20" stroke-width="5" stroke-linecap="round"/>
  <!-- Arm pointing to arrow -->
  <line x1="35" y1="38" x2="55" y2="32" stroke="#231F20" stroke-width="4" stroke-linecap="round"/>
  <!-- Circular recycling arrow -->
  <path d="M65 20 C80 20 90 35 88 50 C86 65 75 75 60 75 C50 75 42 68 40 58"
        fill="none" stroke="#231F20" stroke-width="4"/>
  <!-- Arrow head -->
  <polygon points="38,58 46,62 42,52" fill="#231F20"/>
</svg>
