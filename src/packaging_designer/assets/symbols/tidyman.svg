<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <!-- Tidyman - person disposing litter -->
  <!-- Head -->
  <circle cx="38" cy="15" r="8" fill="#231F20"/>
  <!-- Body -->
  <line x1="38" y1="23" x2="38" y2="55" stroke="#231F20" stroke-width="5" stroke-linecap="round"/>
  <!-- Left arm (holding trash) -->
  <line x1="38" y1="35" x2="55" y2="28" stroke="#231F20" stroke-width="4" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="38" y1="35" x2="22" y2="45" stroke="#231F20" stroke-width="4" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="38" y1="55" x2="28" y2="80" stroke="#231F20" stroke-width="4" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="38" y1="55" x2="48" y2="80" stroke="#231F20" stroke-width="4" stroke-linecap="round"/>
  <!-- Trash bin -->
  <rect x="52" y="35" width="20" height="28" rx="2" fill="none" stroke="#231F20" stroke-width="3"/>
  <line x1="52" y1="42" x2="72" y2="42" stroke="#231F20" stroke-width="2"/>
  <!-- Trash piece -->
  <rect x="56" y="24" width="8" height="8" rx="1" fill="#231F20" transform="rotate(-15 60 28)"/>
</svg>
